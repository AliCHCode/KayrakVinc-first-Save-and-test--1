<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayrak Vinç Galeri</title>
    <link rel="stylesheet" href="./css/Galeri.css">
</head>
<body>
    <div class="mainLine">
        
        <section class="pageTitleSection">
            <div class="pageTitleContent">
                <span class="titleSquare"></span>
                <h1>
                    Kayrak Vinç Galeri
                </h1>
            </div>
        </section>

        <section class="gallerySection">
            <div class="galleryTabs" id="galleryTabs"></div>

            <div class="galleryGrid" id="galleryGrid"></div>
        </section>

    </div>

    <div class="lightbox" id="lightbox" hidden>
        <button class="lightboxClose" id="lightboxClose" aria-label="Kapat">&times;</button>
        <img id="lightboxImg" src="" alt="">
    </div>

    <script src="./js/config.js"></script>
    <script src="./js/navigator.js"></script>
    <script src="./js/galeri.js"></script>
