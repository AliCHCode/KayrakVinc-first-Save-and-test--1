<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim</title>
    <link rel="stylesheet" href="./css/İletişim.css">
</head>
<body>
    <div class="mainLine">

        <section class="pageTitleSection contactTitleSection">
            <div class="pageTitleContent">
                <span class="titleSquare"></span>
                <h1>
                    BİZİMLE İLETİŞİME GEÇİN
                </h1>
            </div>
        </section>

        <section class="contactSection">
            <div class="contactContent">
                <!-- FORM -->
                <form class="contactForm" action="https://formsubmit.co/info@kayrakvinc.com" method="post">
                    <!-- FormSubmit ayarları -->
                    <input type="hidden" name="_subject" value="Kayrak Vinç - Yeni İletişim Formu Mesajı">
                    <input type="hidden" name="_template" value="table">
                    <input type="hidden" name="_captcha" value="false">
                    <!-- Bot tuzağı (kullanıcı görmez) -->
                    <input type="text" name="_honey" style="display:none">
                    <div class="inputRow">
                        <input type="text" id="firstName" name="Ad" placeholder="Adınız" required>
                        <input type="text" id="lastName" name="Soyad" placeholder="Soyadınız" required>
                    </div>
                    <input type="email" id="email" name="email" placeholder="Email" required>
                    <input type="tel" id="phone" name="Telefon" placeholder="Telefon" required>
                    <textarea id="message" name="Mesaj" placeholder="Mesajınız" required></textarea>
                    <button type="submit">
                        GÖNDERİN
                    </button>
                    <p class="formFeedback" id="formFeedback" role="status" aria-live="polite"></p>
                </form>
                <!-- INFO -->
                <div class="contactInfo">
                    <h2>
                        KAYRAK VİNÇ CRANE SYSTEMS
                    </h2>
                    <p>
                        Beşköprü Sanayi Sitesi D-100 Karayolu Üzeri
                        No:188, 54050 Serdivan / Sakarya
                    </p>
                    <p>
                        Tel: +90 542 369 96 54
                    </p>
                    <p>
                        info@kayrakvinc.com
                    </p>
                    <div class="socialList">
                        <a href="#">
                            <img src="./assets/Contact/youtube.svg" alt="Youtube">
                            <span>#kayrakvinc</span>
                        </a>
                        <a href="https://www.linkedin.com/in/kayrak-vin%C3%A7-crane-systems-b9ba56245?originalSubdomain=tr">
                            <img src="./assets/Contact/linkedin.svg" alt="Linkedin">
                            <span>#kayrakvinc</span>
                        </a>
                        <a href="https://wa.me/905498889654">
                            <img src="./assets/Contact/phone.svg" alt="Whatsapp">
                            <span>#kayrakvinc</span>
                        </a>
                    </div>
                </div>
            </div>
        </section>
       

        <section class="contactMapSection" id="googleMapsSection">
            <div class="contactMap">
                <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d24186.26492288812!2d30.32715797424316!3d40.73379542431592!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14cac7569962b73b%3A0x44641746600be67f!2zS0FZUkFLIFbEsE7Dhw!5e0!3m2!1str!2str!4v1783520599202!5m2!1str!2str"
                loading="lazy"
                referrerpolicy="strict-origin-when-cross-origin"
                allowfullscreen="">
                </iframe>
            </div>
        </section>

    </div>
    <script src="./js/navigator.js"></script>
</body>
</html>
